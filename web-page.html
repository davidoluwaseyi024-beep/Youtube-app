<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>

    <div class=" min-h-screen bg-slate-200 grid grid-rows-4">
  
      <!-- Row 1-->
      <div class=" border row-span-1 grid grid-cols-10">
        <div class="col-span-3 border"> col 1</div>
        <div class="col-span-2 border"> col 2</div>
        <div class="col-span-5 border"> col 3</div>
      </div>

      <!-- Row 2 -->
       <div class="row-span-1 grid grid-cols-10">
          <div class="border"> col 1</div>
        <div class="col-span-2 border"> col 2</div>
        <div class="col-span-2 border"> col 3</div>
        <div class="col-span-2 border"> col 4</div>
        <div class="col-span-2 border"> col 5</div>
        <div class="border"> col 6</div>
      </div>
      <!-- Row 3 -->
      <div class=" row-span-2 grid grid-cols-10">
        <div class="border"> col 1</div>
        <div class="col-span-2 border"> col 2</div>
        <div class="col-span-2 border"> col 3</div>
        <div class="col-span-2 border"> col 4</div>
        <div class="col-span-2 border"> col 5</div>
        <div class="border">col 6</div>

      </div>
    </div>
    
  </body>
</html>
